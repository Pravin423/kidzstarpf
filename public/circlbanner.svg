<svg width="1500" height="1500" viewBox="0 0 1500 1500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft, glowing, elegant radial gradient strictly matching the reference -->
    <radialGradient id="exactRadialGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="65%" stop-color="#FFFCF2" />
      <stop offset="90%" stop-color="#FDF4BF" />
      <stop offset="100%" stop-color="#F7EB9E" />
    </radialGradient>
    
    <!-- Wide organic Gaussian blur to spread the yellow glow safely inside oversized margins -->
    <!-- Expanded filter bounds massively to cover expanded blur values -->
    <filter id="organicBlur" x="-50%" y="-50%" width="200%" height="200%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="60" result="blur1" />
      <feComponentTransfer in="blur1" result="softerGlow">
        <feFuncA type="linear" slope="0.7"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="softerGlow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Centered on 750,750 with plenty of safe blank space so edges never clip! -->
  <circle cx="750" cy="750" r="520" fill="url(#exactRadialGlow)" filter="url(#organicBlur)"/>
</svg>
